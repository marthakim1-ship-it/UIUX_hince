<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hince</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="normal.css">
</head>
<body>
    <header>
        <!-- 상단 팝업 -->
        <div class="pop-up">
            <a href="#" target="_blank" title="kakaolink">카카오톡 플러스 친구 추가 시 3,000원 쿠폰!</a>
            
        <div class="close">

    </div>
    <!-- 왼쪽: 햄버거 메뉴 버튼 -->
    <div class="top-bar">
        <div class="menu-btn-box">
            <a href="#" target="_blank">
                <img src="./image/icon_menu.svg" alt="menu">
            </a>
        </div>
        <!-- 가운데: 로고 -->
        <h1 class="logo-box">
            <a href="#" target="_blank">

        <!-- 오른쪽 검색창+아이콘 그룹 -->
        <div class="util-box">
            <!-- 검색 -->
            <li class="search">
                <a href="/search" aria-label="검색창 열기">
                    <img src="./image/Icon_search.svg" alt="검색 아이콘">
                </a>
            </li>    
        <!-- 마이페이지 -->
            <div class="user-box">
                <a href="#" target="_blank">
                    <img src="./image/Icon_user.svg" alt="user-box">
                </a>
            </div>
        <!-- 장바구니 -->
            <div class="shoppingbag">
                <a href="#" target="_blank">
                    <img src="./image/Icon_shoppingbag.svg" alt="shoppingbag">
                </a>
            </div>
        </div>
    </div>
<main>

<!-- /* 힌스 메인 비주얼 슬라이드 영역 */ -->

    <div class="slide-container">
        <div class="slide-wrapper">
            
            <div class="slide-item slide1">

                </div>
                <div class="slide-img">
                    <img src="./image/slide/mainslide01.webp" alt="뉴 블러 립스틱">
                </div>
            </div>

            <div class="slide-item slide2">
                <div class="slide-text">
                    <span class="slide-indicator">── ⏸</span>
                    <h2>FLOW GLOW</h2>
                    <p>맑게 차오르는 물결 광채<br>더 가볍고 투명한 글로우 밤</p>
                </div>
                <div class="slide-img">
                    <img src="./image/slide/mainslide02.webp" alt="글로우 밤">

        </a>
